name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  gemini-review:
    name: Gemini PR Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI for PR Review
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          github_pr_number: '${{ github.event.pull_request.number }}'
          gemini_model: 'gemini-2.5-flash'
          prompt: 'GitHub MCP를 사용해 PR #${{ github.event.pull_request.number }}의 변경 내용을 가져와서 한국어로 코드 리뷰를 작성해줘. 버그 가능성, 보안 문제, 성능 이슈가 있으면 반드시 언급하고, 개선할 코드가 있다면 수정 예시를 코드 블록으로 보여줘. 리뷰가 완성되면 pull_request_review_write 도구로 PR에 코멘트를 달아줘.'
          settings: |-
            {
              "sandbox": false,
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "read_file"
                ]
              }
            }
